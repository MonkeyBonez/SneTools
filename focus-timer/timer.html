<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>min</title>
  <style>
    :root {
      --bg:        #111;
      --fg:        #f5f5f3;
      --fg-idle:   #3a3a3a;
      --fg-paused: #555;
      --ctl:       #444;
      --ctl-hover: #f5f5f3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      overflow: hidden;
    }

    #n {
      font-family: ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Code', 'Courier New', monospace;
      font-weight: 700;
      font-size: clamp(160px, 35vw, 480px);
      color: var(--fg);
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      transition: opacity 0.08s ease;
    }

    #n.tick    { opacity: 0; }
    #n.idle    { color: var(--fg-idle); }
    #n.paused  { color: var(--fg-paused); }

    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
      height: 28px;
    }

    .ctl {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--ctl);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctl:hover       { color: var(--ctl-hover); }
    .ctl svg         { display: block; }
    .ctl[hidden]     { display: none; }

    #btn-color {
      position: fixed;
      bottom: 24px;
      right: 28px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--ctl);
      opacity: 0.4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease;
    }

    #btn-color:hover { opacity: 0.9; }
    #btn-color.on    { opacity: 0.75; }
  </style>
</head>
<body>
  <div id="n" class="idle">0</div>

  <div id="controls">
    <button class="ctl" id="btn-play" title="Start">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <polygon points="4,2 18,10 4,18"/>
      </svg>
    </button>

    <button class="ctl" id="btn-pause" hidden title="Pause">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect x="3"  y="2" width="5" height="16" rx="1"/>
        <rect x="12" y="2" width="5" height="16" rx="1"/>
      </svg>
    </button>

    <button class="ctl" id="btn-restart" hidden title="Restart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5V1L7 6l5 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
      </svg>
    </button>
  </div>

  <!-- color cycle toggle: bottom-right corner -->
  <button id="btn-color" title="Color cycle">
    <svg id="color-icon" width="10" height="10" viewBox="0 0 10 10">
      <circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </svg>
  </button>

  <script>
    const el         = document.getElementById('n');
    const btnPlay    = document.getElementById('btn-play');
    const btnPause   = document.getElementById('btn-pause');
    const btnRestart = document.getElementById('btn-restart');
    const btnColor   = document.getElementById('btn-color');
    const colorIcon  = document.getElementById('color-icon');
    const root       = document.documentElement;

    // --- stopwatch state ---
    let state    = 'idle';
    let elapsed  = 0;
    let runStart = 0;
    let interval = null;
    let last     = -1;

    // --- color mode ---
    let colorMode = false;
    let rafId     = null;

    const PERIOD = 90 * 60 * 1000; // 90 min in ms

    // dark → light color stops
    const DARK  = { bg:[17,17,17],    fg:[245,245,243], idle:[58,58,58],    paused:[85,85,85],    ctl:[68,68,68],    ctlHover:[245,245,243] };
    const LIGHT = { bg:[250,250,248], fg:[17,17,17],    idle:[204,204,204], paused:[136,136,136], ctl:[187,187,187], ctlHover:[17,17,17]    };

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpC(a, b, t) { return a.map((v, i) => Math.round(lerp(v, b[i], t))); }
    function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

    function cycleT(ms) {
      const pos = ms % (PERIOD * 2);
      return pos < PERIOD ? pos / PERIOD : 1 - (pos - PERIOD) / PERIOD;
    }

    function applyTheme(t) {
      root.style.setProperty('--bg',        rgb(lerpC(DARK.bg,       LIGHT.bg,       t)));
      root.style.setProperty('--fg',        rgb(lerpC(DARK.fg,       LIGHT.fg,       t)));
      root.style.setProperty('--fg-idle',   rgb(lerpC(DARK.idle,     LIGHT.idle,     t)));
      root.style.setProperty('--fg-paused', rgb(lerpC(DARK.paused,   LIGHT.paused,   t)));
      root.style.setProperty('--ctl',       rgb(lerpC(DARK.ctl,      LIGHT.ctl,      t)));
      root.style.setProperty('--ctl-hover', rgb(lerpC(DARK.ctlHover, LIGHT.ctlHover, t)));
    }

    function resetTheme() {
      ['--bg','--fg','--fg-idle','--fg-paused','--ctl','--ctl-hover']
        .forEach(v => root.style.removeProperty(v));
    }

    function totalMs() {
      return state === 'running' ? elapsed + (Date.now() - runStart) : elapsed;
    }

    function colorLoop() {
      applyTheme(cycleT(totalMs()));
      rafId = requestAnimationFrame(colorLoop);
    }

    function startColorLoop() {
      if (rafId) cancelAnimationFrame(rafId);
      colorLoop();
    }

    function stopColorLoop() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    // --- stopwatch ---

    function render(force) {
      const min = Math.floor(totalMs() / 60000);
      if (min !== last || force) {
        el.classList.add('tick');
        setTimeout(() => {
          el.textContent = min;
          el.classList.remove('tick');
        }, 80);
        last = min;
      }
    }

    function setUI() {
      el.classList.toggle('idle',   state === 'idle');
      el.classList.toggle('paused', state === 'paused');
      btnPlay.hidden    = state === 'running';
      btnPause.hidden   = state !== 'running';
      btnRestart.hidden = state !== 'paused';
    }

    function start() {
      runStart = Date.now();
      state    = 'running';
      interval = setInterval(render, 1000);
      render(true);
      setUI();
      if (colorMode) startColorLoop();
    }

    function pause() {
      elapsed += Date.now() - runStart;
      state = 'paused';
      clearInterval(interval);
      stopColorLoop();
      if (colorMode) applyTheme(cycleT(totalMs())); // freeze at current color
      setUI();
    }

    function restart() {
      elapsed = 0;
      last    = -1;
      start();
    }

    btnPlay.addEventListener('click',    start);
    btnPause.addEventListener('click',   pause);
    btnRestart.addEventListener('click', restart);

    // --- color toggle ---
    btnColor.addEventListener('click', () => {
      colorMode = !colorMode;
      btnColor.classList.toggle('on', colorMode);
      colorIcon.innerHTML = colorMode
        ? '<circle cx="5" cy="5" r="4"/>'
        : '<circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>';

      if (colorMode) {
        startColorLoop();
      } else {
        stopColorLoop();
        resetTheme();
      }
    });

    // init
    setUI();
    el.textContent = '0';
  </script>
</body>
</html>
